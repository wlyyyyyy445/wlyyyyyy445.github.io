<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#3B82F6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>温度、电流和电压监测</title>
    <link rel="manifest" href="static/manifest.json">
    <link rel="stylesheet" href="static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="static/js/lang.js"></script>
</head>
<body>
    <div id="backend-banner" style="display:none;background:#EF4444;color:#fff;text-align:center;padding:8px;font-size:0.85rem"></div>
    <!-- ====== Top Bar ====== -->
    <header class="topbar">
        <div class="topbar-brand">
            <span class="brand-icon">🌡</span>
            <span class="brand-text">温度、电流和电压监测</span>
        </div>
        <div class="topbar-status">
            <button id="btn-recording" class="btn btn-sm btn-record" onclick="toggleRecording()">🔴 开始采集</button>
            <span id="recording-info" class="recording-info"></span>
            <span id="sample-rate-display" class="recording-info" style="margin-left:12px;color:var(--accent)"></span>
            <button class="btn btn-sm" onclick="clearDashboard()" title="清除曲线">🗑</button>
            <button id="btn-ble-connect" class="btn btn-sm" onclick="toggleBLE()">🔗 BLE</button>
            <span id="ble-status"></span><select id="lang-select" class="lang-select" onchange="setLang(this.value)"><option value="zh-CN">中</option><option value="en">EN</option><option value="zh-TW">繁</option><option value="ja">日</option><option value="ko">한</option><option value="fr">FR</option><option value="de">DE</option><option value="es">ES</option><option value="pt">PT</option><option value="ru">RU</option><option value="ar">AR</option></select>
            <!-- serial hidden: <span id="conn-indicator" class="status-dot disconnected"></span>
            <span id="conn-text" class="status-label">未连接</span>
            <span id="conn-port" class="status-port"></span> -->
        </div>
    </header>

    <!-- ====== Tab Navigation ====== -->
    <nav class="tabbar" id="tabbar">
        <button class="tab active" data-tab="dashboard">📊 Dashboard</button>
        <button class="tab" data-tab="history">📈 历史数据</button>
        <button class="tab" data-tab="settings">⚙️ 设备设置</button>
        
        
        
    </nav>

    <!-- ====== Tab Content ====== -->
    <main class="main-content">
        <!-- Dashboard Tab -->
        <section class="tab-content active" id="tab-dashboard">
            <!-- Data Display -->
            <div id="dashboard-data">
            <div class="cards-row">
                <div class="card card-temp">
                    <div class="card-header"><span class="card-icon">🌡</span><span class="card-title">温度</span><span class="card-unit">°C</span></div>
                    <div class="card-value" id="val-temp">--</div>
                    <div class="card-status" id="status-temp"></div>
                </div>
                <div class="card card-current">
                    <div class="card-header"><span class="card-icon">⚡</span><span class="card-title">电流</span><span class="card-unit">μA</span></div>
                    <div class="card-value" id="val-current">--</div>
                    <div class="card-status" id="status-current"></div>
                </div>
                <div class="card card-voltage">
                    <div class="card-header"><span class="card-icon">🔌</span><span class="card-title">电压</span><span class="card-unit">V</span></div>
                    <div class="card-value" id="val-voltage">--</div>
                    <div class="card-status" id="status-voltage"></div>
                </div>
            </div>
            <div class="cards-row secondary-row">
                <div class="card card-battery">
                    <div class="card-header"><span class="card-icon">🔋</span><span class="card-title">电池电压 (推算)</span><span class="card-unit">V</span></div>
                    <div class="card-value" id="val-battery">--</div>
                    <div class="card-sub" id="sub-battery"></div>
                </div>
                <div class="card card-uptime">
                    <div class="card-header"><span class="card-icon">⏱</span><span class="card-title">运行时间</span></div>
                    <div class="card-value" id="val-uptime">--</div>
                    <div class="card-sub" id="sub-uptime"></div>
                </div>
            </div>
            <div class="charts-grid">
                <div class="chart-card"><h3 class="chart-title">🌡 温度趋势 (°C)</h3><div class="chart-container"><canvas id="chart-temp"></canvas></div></div>
                <div class="chart-card"><h3 class="chart-title">⚡ 电流趋势 (μA)</h3><div class="chart-container"><canvas id="chart-current"></canvas></div></div>
                <div class="chart-card"><h3 class="chart-title">🔌 电压趋势 (V)</h3><div class="chart-container"><canvas id="chart-voltage"></canvas></div></div>
            </div>
            <!-- Waveform chart — high-speed real-time view (2000Hz downsampled) -->
            <div class="chart-card" style="margin-top:1rem">
                <h3 class="chart-title">📈 实时波形 (电流/电压 高速采样)</h3>
                <div class="chart-container"><canvas id="chart-waveform"></canvas></div>
            </div>
        </section>

        <!-- History Tab -->
        <section class="tab-content" id="tab-history">
            <div class="history-toolbar">
                <button id="btn-refresh-history" class="btn btn-primary">🔄 刷新</button>
                <span class="history-count" id="history-count">0 sessions</span>
            </div>
            <div class="history-filters" style="display:flex;gap:0.5rem;margin-bottom:0.75rem;flex-wrap:wrap">
                <button class="btn btn-sm filter-btn active" onclick="filterSessions('all')">📂 全部</button>
                <button class="btn btn-sm filter-btn" onclick="filterSessions('Web')">🌐 网页</button>
                <button class="btn btn-sm filter-btn" onclick="filterSessions('Desktop')">💻 电脑软件</button>
                <button class="btn btn-sm filter-btn" onclick="filterSessions('Flutter')">📱 手机软件</button>
            </div>
            <div id="session-list" class="session-list"></div>
        </section>

        <!-- Settings Tab -->
        <section class="tab-content" id="tab-settings">
            <div class="settings-card">
                <h3>后端服务器地址</h3>
                <div class="settings-row">
                    <input type="text" id="backend-url" placeholder="http://localhost:8080" class="input-text" style="width:320px">
                    <button id="btn-save-backend" class="btn btn-primary">💾 保存并重连</button>
                </div>
                <div style="font-size:0.75rem;color:var(--text-muted);margin-top:0.5rem">
                    💡 本地调试默认 localhost:8080；远程使用 Cloudflare Tunnel 或云服务器地址
                </div>
            </div>
            <!-- Serial hidden:
            <div class="settings-card">
                <h3>串口连接</h3>
                <div class="settings-row">
                    <select id="port-select" class="select"><option value="">-- 扫描串口 --</option></select>
                    <button id="btn-scan" class="btn">🔍 扫描</button>
                    <button id="btn-connect" class="btn btn-primary">🔗 连接</button>
                    <button id="btn-disconnect" class="btn btn-danger">⏹ 断开</button>
                </div>
                <div class="settings-row" style="margin-top: 1rem;">
                    <label>采样率：<span id="sample-rate">500ms (2Hz)</span></label>
                </div>
            </div>
            -->
            <div class="settings-card">
                <h3>报警阈值</h3>
                <div class="settings-row">
                    <label>温度上限：<input type="number" id="thresh-temp" value="30" step="0.1" class="input-sm"> °C</label>
                    <label>温度下限：<input type="number" id="thresh-temp-min" value="0" step="0.1" class="input-sm"> °C</label>
                </div>
                <div class="settings-row">
                    <label>电流上限：<input type="number" id="thresh-current" value="1000" step="1" class="input-sm"> μA</label>
                </div>
                <div class="settings-row">
                    <label>电压下限：<input type="number" id="thresh-voltage" value="2.8" step="0.01" class="input-sm"> V</label>
                </div>
                <button id="btn-save-thresholds" class="btn btn-primary">💾 保存</button>
            </div>
        </section>
    </main>

    <!-- Session Detail Modal -->
    <div id="session-modal" class="modal-overlay" style="display:none">
      <div class="modal-content">
        <div class="modal-header">
          <h3 id="modal-title">Session Detail</h3>
          <button class="btn btn-sm" onclick="closeModal()">✕ Close</button>
        </div>
        <div class="modal-body">
          <div class="modal-stats" id="modal-stats"></div>
          <div class="modal-toolbar">
            <button class="btn btn-sm" onclick="exportSession('csv')">📥 CSV</button>
            <button class="btn btn-sm" onclick="exportSession('json')">📋 JSON</button>
            <button class="btn btn-sm" onclick="exportSession('txt')">📄 TXT</button>
            <button class="btn btn-sm btn-danger" onclick="deleteCurrentSession()">🗑 Delete</button>
            <span id="modal-record-count" style="font-size:0.8rem;color:var(--text-sub);margin-left:12px"></span>
          </div>
          <div class="charts-grid" style="margin-top:1rem">
            <div class="chart-card"><h3 class="chart-title">🌡 Temperature (°C)</h3><div class="chart-container"><canvas id="m-chart-temp"></canvas></div></div>
            <div class="chart-card"><h3 class="chart-title">⚡ Current (μA)</h3><div class="chart-container"><canvas id="m-chart-cur"></canvas></div></div>
            <div class="chart-card"><h3 class="chart-title">🔌 Voltage (V)</h3><div class="chart-container"><canvas id="m-chart-volt"></canvas></div></div>
          </div>
          <button class="btn btn-sm" onclick="exportChartImages()" style="margin-top:0.5rem">🖼 Export Charts as PNG</button>
        </div>
      </div>
    </div>

        <script>
        // Default backend: cloud server
        if (!localStorage.getItem('backend_url')) {
            localStorage.setItem('backend_url', 'https://temp.luyaowang.com');
        }
        // Check backend connectivity on load
        fetch('https://temp.luyaowang.com/api/status').catch(function() {
            document.getElementById('backend-banner').style.display = 'block';
            document.getElementById('backend-banner').innerHTML = '无法连接后端。请直接访问 <a href="https://temp.luyaowang.com" style="color:#fff;font-weight:bold">https://temp.luyaowang.com</a> 使用完整功能（BLE数据本地显示正常，但无法保存到数据库）';
        });
    </script>
    <script src="static/js/ble_receiver.js"></script>
    <script src="static/js/dashboard.js"></script>
    
</body>
</html>
